on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions: {}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      # To upload archives as GitHub Releases
      contents: write
      # To push Docker images to GitHub
      packages: write
    steps:
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.25.x
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # All history, required for goreleaser
          fetch-depth: 0
      - # For TagBody, TagSubject or TagContents fields in goreleaser's templates
        run: git fetch --force --tags
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: v2.15.2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
